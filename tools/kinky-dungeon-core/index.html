<body style="width:100%; height:100%; background-color:black; margin:0px; padding:0px; overflow:hidden;">
<script src="Game/pixi.min.js"></script>

<script src="Scripts/lib/guessLanguage_js/_languageData.js"></script>
<script src="Scripts/lib/guessLanguage_js/guessLanguage.js"></script>
<script src="Scripts/lib/zip-full.min.js"></script>
<script src="Scripts/lib/web-streams-polyfill.min.js"></script>
<!-- 自动装载服务器端作弊模组入库 -->
<script>
(async function() {
	const MOD_NAME = "enchanted_restraints";
	const STORE_NAME = "KinkyDungeonModSave";
	const DB_NAME = "KinkyDungeonModSave";
	const LIST_KEY = "KinkyDungeonModList";

	function downloadAndSave() {
		console.log("[AutoCheatMod] Mod file missing in IndexedDB. Downloading and registering...");
		fetch("Mods/enchanted_restraints.zip")
			.then(response => {
				if (!response.ok) throw new Error("HTTP " + response.status);
				return response.blob();
			})
			.then(blob => {
				const fileObject = new File([blob], MOD_NAME + ".zip", { type: "application/zip" });
				const openRequest = indexedDB.open(DB_NAME);
				openRequest.onupgradeneeded = function(e) {
					let db = e.target.result;
					if (!db.objectStoreNames.contains(STORE_NAME)) {
						db.createObjectStore(STORE_NAME, { autoIncrement: true });
					}
				};
				openRequest.onsuccess = function(e) {
					let db = e.target.result;
					const transaction = db.transaction(STORE_NAME, "readwrite");
					const store = transaction.objectStore(STORE_NAME);
					const putRequest = store.put({ modFile: fileObject }, MOD_NAME);
					putRequest.onsuccess = function() {
						let list = [];
						try {
							list = JSON.parse(localStorage.getItem(LIST_KEY) || "[]");
						} catch(ex) {}
						if (!list.includes(MOD_NAME)) {
							list.push(MOD_NAME);
							localStorage.setItem(LIST_KEY, JSON.stringify(list));
						}
						console.log("[AutoCheatMod] Cheat Mod registered successfully! Reloading page...");
						location.reload();
					};
				};
			})
			.catch(err => {
				console.error("[AutoCheatMod] Failed to register cheat mod:", err);
			});
	}

	try {
		const openRequest = indexedDB.open(DB_NAME);
		openRequest.onupgradeneeded = function(e) {
			let db = e.target.result;
			if (!db.objectStoreNames.contains(STORE_NAME)) {
				db.createObjectStore(STORE_NAME, { autoIncrement: true });
			}
		};
		openRequest.onsuccess = function(e) {
			let db = e.target.result;
			if (!db.objectStoreNames.contains(STORE_NAME)) {
				downloadAndSave();
				return;
			}
			const transaction = db.transaction(STORE_NAME, "readonly");
			const store = transaction.objectStore(STORE_NAME);
			const getRequest = store.get(MOD_NAME);
			getRequest.onsuccess = function() {
				if (getRequest.result && getRequest.result.modFile) {
					console.log("[AutoCheatMod] Verified: Mod file exists in IndexedDB.");
					let list = [];
					try {
						list = JSON.parse(localStorage.getItem(LIST_KEY) || "[]");
					} catch(ex) {}
					if (!list.includes(MOD_NAME)) {
						list.push(MOD_NAME);
						localStorage.setItem(LIST_KEY, JSON.stringify(list));
						console.log("[AutoCheatMod] Synced localStorage list. Reloading page...");
						location.reload();
					}
				} else {
					downloadAndSave();
				}
			};
			getRequest.onerror = function() {
				downloadAndSave();
			};
		};
		openRequest.onerror = function() {
			downloadAndSave();
		};
	} catch(e) {
		downloadAndSave();
	}
})();
</script>
<script src="./out/main.js"></script>

</body>
