    readCurrentPage() {
        // Butterfly theme uses #article-container usually
        const article = document.getElementById('article-container') || 
                        document.querySelector('.post-content') || 
                        document.querySelector('article') ||
                        document.body;
        
        if (!article) return "无法读取当前页面内容。";
        
        // Clean up text (remove scripts, styles)
        const clone = article.cloneNode(true);
        const scripts = clone.querySelectorAll('script, style, noscript');
        scripts.forEach(n => n.remove());
        
        let text = clone.innerText || "";
        // Truncate if too long (e.g. > 5000 chars) to save tokens, or trust V3
        return text.substring(0, 5000) + (text.length > 5000 ? "...(内容太长，已截断)" : "");

    async compressHistory() {
        if (chatHistory.length <= 32) return;
        console.log("Compressing history...");
        
        const toSummarize = chatHistory.slice(0, chatHistory.length - 10);

            ];
            localStorage.setItem('oml2d_history', JSON.stringify(chatHistory));
            console.log("History compressed.");
        } catch(e) { console.error("Compression failed", e); }
    }
};

const LLM = {
    async chat(userMessage, callbacks) {
        stopIdleLoop();
        callbacks.onLoading(true);

        try {
            // System Prompt (Nene Persona)

                    "【性格设定】 " +
                    "1. 性格温柔体贴，有些纯真和天然呆，非常容易害羞（动不动就脸红）。 " +

                    "2. list_site_pages — 列出所有页面（工具、游戏、分类等），用户问‘有什么’时主动调用 " +
                    "3. navigate — 跳转到任意页面（支持中文，如‘首页’‘2048’‘贪吃蛇’），用户说‘带我去/打开/跳转’时使用 " +
                    "4. read_current_page — 读取当前页面内容，用户问‘这篇文章讲了什么’时调用 " +
                    "5. react_motion — 触发 Live2D 动作 " +
                    "【导航策略】当用户想看搜索结果中的某篇文章时，直接调用 navigate 跳转。用户问‘有什么好玩的’时，先调 list_site_pages 再推荐。 " +
                    "【双通道回复】" +
                    "请务必在回答开头加入一句犀利或可爱的吐槽（10字以内），必须用 {{ 和 }} 包裹。这部分内容会显示在Live2D气泡中。" +

                    "动作对应：Tap身体=开心/普通，Tap头顶=害羞/抱歉，Tap裙子=生气/拒绝，Tap呆毛=卖萌/唱歌，Tap左胸=亲近。 " +
                    "当前时间：" + new Date().toLocaleString() + "。";

            const messages = [
                { role: "system", content: systemContent },
                ...chatHistory, // Use full history (managed by compression)
                { role: "user", content: userMessage }
            ];

            // Tool Definitions
            const tools = [
                {
                    type: "function",
                    function: {
                        name: "search_blog",
                        description: "Search blog posts when user asks about technical topics or blog content.",
                        parameters: {
                            type: "object",
                            properties: {
                                query: { type: "string", description: "Keywords to search" }
                            },
                            required: ["query"]
                        }
                    }

                {
                    type: "function",
                    function: {
                        name: "react_motion",
                        description: "Trigger a Live2D motion based on emotion.",
                        parameters: {
                            type: "object",
                            properties: {
                                motion: {

                                    description: "Motion group name", 
                                    enum: ["Tap身体", "Tap头顶", "Tap脸", "Tap裙子", "Tap左胸", "Tap呆毛"] 
                                }

                            required: ["motion"]
                        }

                },
                {
                    type: "function",
                    function: {
                        name: "list_site_pages",
                        description: "列出博客的所有可访问页面，包括分类页、工具页、游戏页等。当用户问'有什么'、'能做什么'、'有哪些页面/工具/游戏'时主动调用。",
                        parameters: { type: "object", properties: {}, required: [] }
                    }
                },
                {
                    type: "function",
                    function: {
                        name: "navigate",
                        description: "跳转到博客内任意页面。支持中文别名（首页/关于/标签/分类/归档/工具/游戏/2048/贪吃蛇/吃豆人/扫雷/五子棋/坦克大战/俄罗斯方块/文件转换/哈希计算/二维码/YOLO/WebGPU/VPN 等）。用户说'带我去'、'跳转'、'打开'时使用。",
                        parameters: {
                            type: "object",
                            properties: {
                                path: { type: "string", description: "要跳转的路径或中文名称（如 /about/、首页、2048、贪吃蛇）" }
                            },
                            required: ["path"]
                        }
                    }
                },
                {
                    type: "function",
                    function: {
                        name: "read_current_page",
                        description: "Read the text content of the current page. Use this when user asks about 'this article' or 'current page'.",
                        parameters: {
                            type: "object",
                            properties: {},
                            required: []
                        }
                    }
                }
            ];

            const API_URL = "https://api.deepseek.com/chat/completions";

            // First Call
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + API_KEY
                },
                body: JSON.stringify({
                    model: "deepseek-v4-flash", // Use V3 for speed & tools
                    messages: messages,
                    tools: tools,
                    stream: false
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const choice = data.choices[0];
            const message = choice.message;

            // Handle Tool Calls
            if (message.tool_calls) {
                messages.push(message); // Add assistant's thought/tool_call

                for (const toolCall of message.tool_calls) {
                    const fnName = toolCall.function.name;
                    const args = JSON.parse(toolCall.function.arguments);
                    
                    let toolResult = "";
                    if (fnName === 'search_blog') {
                        toolResult = await Tools.searchBlog(args.query);
                    } else if (fnName === 'list_site_pages') {
                        toolResult = Tools.listSitePages();
                    } else if (fnName === 'react_motion') {
                        toolResult = Tools.triggerMotion(args.motion);
                    } else if (fnName === 'navigate') {
                        toolResult = Tools.navigate(args.path);
                    } else if (fnName === 'read_current_page') {
                        toolResult = Tools.readCurrentPage();
                    }

                    messages.push({
                        role: "tool",
                        tool_call_id: toolCall.id,
                        content: toolResult
                    });
                }

                // Second Call (Streamed)
                const secondResponse = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + API_KEY
                    },
                    body: JSON.stringify({
                        model: "deepseek-v4-flash",
                        messages: messages,
                        tools: tools,
                        stream: true
                    })
                });
                
                const reader = secondResponse.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let finalMsg = "";
                let buffer = "";
                let streamBuffer = "";
                let pendingReaction = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.trim().startsWith('data: ')) {
                            const dataStr = line.trim().substring(6);
                            if (dataStr === '[DONE]') continue;
                            try {
                                const json = JSON.parse(dataStr);
                                const content = json.choices[0].delta.content;
                                if (content) {
                                    if (pendingReaction) {
                                        streamBuffer += content;
                                        if (streamBuffer.trimStart().startsWith('{{')) {
                                            const closeIdx = streamBuffer.indexOf('}}');
                                            if (closeIdx !== -1) {
                                                const reaction = streamBuffer.substring(streamBuffer.indexOf('{{') + 2, closeIdx);
                                                const duration = 3000 + reaction.length * 30;
                                                if (oml2dInstance) oml2dInstance.tips.notification(reaction, duration);
                                                
                                                const rest = streamBuffer.substring(closeIdx + 2);
                                                finalMsg += rest;
                                                callbacks.onMessage(finalMsg);
                                                
                                                pendingReaction = false;
                                                streamBuffer = "";
                                            }
                                        } else if (streamBuffer.length > 10) {
                                            finalMsg += streamBuffer;
                                            callbacks.onMessage(finalMsg);
                                            pendingReaction = false;
                                            streamBuffer = "";
                                        }
                                    } else {
                                        finalMsg += content;
                                        callbacks.onMessage(finalMsg);
                                    }
                                }
                            } catch (e) {
                                console.error("Stream parse error", e);
                            }
                        }
                    }
                }
                if (pendingReaction && streamBuffer) {
                     finalMsg += streamBuffer;
                     callbacks.onMessage(finalMsg);
                }

                // Save History & Compress
                chatHistory.push({ role: "user", content: userMessage });
                chatHistory.push({ role: "assistant", content: finalMsg });
                localStorage.setItem('oml2d_history', JSON.stringify(chatHistory));
                
                const replyArea = document.getElementById('oml2d-reply-area');
                if (replyArea && finalMsg) {
                    const autoHideDuration = 3000 + finalMsg.length * 30;
                    autoHideTimer = setTimeout(() => replyArea.classList.remove('visible'), autoHideDuration);
                }
                Tools.compressHistory();

            } else {
                let content = message.content;
                // Dual Channel Check for non-stream response
                if (content.trim().startsWith('{{')) {
                     const closeIdx = content.indexOf('}}');
                     if (closeIdx !== -1) {
                         const reaction = content.substring(content.indexOf('{{') + 2, closeIdx);
                         const duration = 3000 + reaction.length * 30;
                         if (oml2dInstance) oml2dInstance.tips.notification(reaction, duration);
                         content = content.substring(closeIdx + 2);
                     }
                }
                callbacks.onMessage(content);

                // Save History & Compress
                chatHistory.push({ role: "user", content: userMessage });
                chatHistory.push({ role: "assistant", content: content });
                localStorage.setItem('oml2d_history', JSON.stringify(chatHistory));
                
                const replyArea = document.getElementById('oml2d-reply-area');
                if (replyArea && content) {
                    const autoHideDuration = 3000 + content.length * 30;
                    autoHideTimer = setTimeout(() => replyArea.classList.remove('visible'), autoHideDuration);
                }
                Tools.compressHistory();
            }

        } catch (error) {
            console.error("LLM Error:", error);
            callbacks.onMessage("宁宁有点晕... 😵 (网络错误)");
        } finally {
            callbacks.onLoading(false);
            startIdleLoop();
        }
    }
};

try {
    const toggleBtn = document.getElementById('oml2d-toggle-btn');

    if (replyArea) {
        replyArea.addEventListener('click', () => {
            replyArea.classList.remove('visible');
        });
    }

    if (toggleBtn) {
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = inputArea.classList.contains('hidden');
            if (isHidden) {
                inputArea.classList.remove('hidden');
                setTimeout(() => chatInput.focus(), 100);
                toggleBtn.innerHTML = '×';
            } else {
                inputArea.classList.add('hidden');
                replyArea.classList.remove('visible'); // Hide reply too
                toggleBtn.innerHTML = '💬';
            }
        });
    }

    const sendMessage = () => {
        const text = chatInput.value.trim();
        if (!text) return;
        
        chatInput.value = '';
        if (autoHideTimer) clearTimeout(autoHideTimer);
        
        // Show loading in reply area
        if (replyArea) {
            replyArea.innerText = "思考中... 🧠";
            replyArea.classList.add('visible');
        }

        LLM.chat(text, {
            onLoading: (isLoading) => {
                 // Handled locally above for instant feedback
            },
            onMessage: (msg) => {
                if (replyArea && msg) {
                    replyArea.innerText = msg;
                    replyArea.classList.add('visible');
                    // Auto scroll to bottom
                    replyArea.scrollTop = replyArea.scrollHeight;
                } 
                // Fallback to alert if something is wrong (shouldn't happen)
                else if (msg) {
                    alert("宁宁: " + msg);
                }
            }
        });
    };

    if (sendBtn) sendBtn.addEventListener('click', sendMessage);
    if (chatInput) chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    if (window.innerWidth >= 768) {
        // Safe Load Logic
        try {
            const res = loadOml2d(CONFIG);
            const setupModel = (inst) => {
                oml2dInstance = inst;
                // Monkey Patch Focus to allow motion override
                if (inst.models && inst.models[0]) {
                    const model = inst.models[0];
                    if (typeof model.focus === 'function') {
                        const originalFocus = model.focus;
                        model.focus = function(x, y) {
                            if (this._lockFocus) return;
                            originalFocus.apply(this, arguments);
                        };
                        console.log("OML2D: Focus controller patched");
                    }
                }
            };

            if (res && typeof res.then === 'function') {
                res.then(inst => {
                    setupModel(inst);
                    console.log('OML2D: Async Loaded');
                    startIdleLoop();
                }).catch(e => console.error('OML2D Async Error:', e));
            } else {
                setupModel(res);
                console.log('OML2D: Sync Loaded');
                startIdleLoop();
            }
        } catch(e) {
            console.error('OML2D Load Error:', e);
        }
    }
} catch (e) {
    console.error('UI Init Failed:', e);
}

					{ id: "converter", name: "开发单位/进制转换器", desc: "多维度的开发常用进制、时间戳与常规物理单位换算器。" },
					{ id: "geojson", name: "GeoJSON 地理工具", desc: "快速读取、解析与渲染地理信息的地图轻量工具。" },
					{ id: "gif", name: "GIF 动图处理", desc: "前端 GIF 拆分、裁剪与画帧分离便捷合成工具。" },
					{ id: "hash", name: "Hash 哈希散列计算", desc: "包含 SHA-256、MD5 在内的纯本地文件与文本哈希运算。" },
					{ id: "color", name: "颜色转换与调色", desc: "提供 HEX、RGB、HSL 颜色值的实时相互转换与配色。" },
					{ id: "json", name: "JSON 格式化与校验", desc: "提供结构化的 JSON 文本层级化展开、压缩与语法校验。" },
					{ id: "qrcode", name: "二维码生成与解析", desc: "快速本地渲染自定义二维码，并支持图像识别解析。" },
					{ id: "mirage-tank", name: "幻影坦克制图 (Mirage Tank)", desc: "在亮暗背景下呈现不同两张图的二次元神奇制图工具。" },
					{ id: "remove-bg", name: "图片去背景", desc: "前端智能去底，保留物体透明通道便捷生成 PNG。" },
					{ id: "sort", name: "可视化排序算法", desc: "直观展示冒泡、快速、归并等多种经典排序算法的实时运行过程。" },
					{ id: "watermark", name: "图片添加水印", desc: "为图片安全打上自定义防盗防爬水印。" }
				];

				const SIMULATIONS = [
					{ id: "webgpu-gravity", name: "WebGPU 星体引力模拟", desc: "利用 WebGPU 驱动的超大规模星体多体引力高仿真物理演算模拟。" }
				];

				let activeToolId = null;

				const initGlobalModal = () => {
					const modal = document.getElementById('global-tool-modal');
					const iframe = document.getElementById('global-tool-iframe');
					const titleText = document.getElementById('modal-tool-title');
					const titleEmoji = document.getElementById('modal-title-emoji');
					const btnClose = document.getElementById('modal-btn-close');
					const btnBack = document.getElementById('modal-btn-back');
					const btnOpenNew = document.getElementById('modal-btn-open-new');
					const lobbyView = document.getElementById('modal-lobby-view');
					const iframeView = document.getElementById('modal-iframe-view');

					if (!modal || !iframe || !btnClose || !lobbyView || !iframeView) return;

					// 1. 动态渲染大厅 DOM 树
					let html = '<div class="modal-lobby-container">';
					html += '<h4 class="modal-sec-title">🎮 经典小游戏</h4><div class="modal-grid">';
					GAMES.forEach(g => {
						html += `
						<div class="modal-item-card" data-id="${g.id}" data-name="${g.name}" data-emoji="🎮">
							<div class="modal-item-icon">🎮</div>
							<div class="modal-item-meta">
								<h5>${g.name}</h5>
								<p>${g.desc}</p>
							</div>
						</div>`;
					});
					html += '</div>';

					html += '<h4 class="modal-sec-title">🛠️ 实用便捷工具</h4><div class="modal-grid">';
					TOOLS.forEach(t => {
						html += `
						<div class="modal-item-card" data-id="${t.id}" data-name="${t.name}" data-emoji="🛠️">
							<div class="modal-item-icon">🛠️</div>
							<div class="modal-item-meta">
								<h5>${t.name}</h5>
								<p>${t.desc}</p>
							</div>
						</div>`;
					});
					html += '</div>';

					html += '<h4 class="modal-sec-title">🚀 星体引力仿真</h4><div class="modal-grid">';
					SIMULATIONS.forEach(s => {
						html += `
						<div class="modal-item-card" data-id="${s.id}" data-name="${s.name}" data-emoji="🚀">
							<div class="modal-item-icon">🚀</div>
							<div class="modal-item-meta">
								<h5>${s.name}</h5>
								<p>${s.desc}</p>
							</div>
						</div>`;
					});
					html += '</div></div>';
					lobbyView.innerHTML = html;

					// 2. 状态切换核心函数
					const showLobbyState = () => {
						activeToolId = null;
						titleText.innerText = "摸鱼工具箱大厅";
						titleEmoji.innerText = "🔧";
						iframe.src = "";
						
						iframeView.classList.remove('active');
						lobbyView.style.display = 'block';
						
						btnBack.classList.add('hidden-btn');
						if (btnOpenNew) btnOpenNew.classList.add('hidden-btn');
					};

					const showRunState = (toolId, title, emoji) => {
						activeToolId = toolId;
						titleText.innerText = title;
						titleEmoji.innerText = emoji || "🔧";
						iframe.src = `/tools-sandbox/${toolId}/index.html`;
						
						lobbyView.style.display = 'none';
						iframeView.classList.add('active');
						
						btnBack.classList.remove('hidden-btn');
						if (btnOpenNew) btnOpenNew.classList.remove('hidden-btn');
					};

					// 3. 打开大厅
					const openLobby = () => {
						showLobbyState();
						modal.classList.add('active');
					};

					// 4. 关闭整个弹窗
					const closeModal = () => {
						modal.classList.remove('active');
						setTimeout(() => {
							showLobbyState();
						}, 300);
					};

					// 绑定控制按钮事件
					btnClose.addEventListener('click', closeModal);
					btnBack.addEventListener('click', showLobbyState);
					modal.addEventListener('click', (e) => {
						if (e.target === modal) closeModal();
					});
					
					if (btnOpenNew) {
						btnOpenNew.addEventListener('click', () => {
							if (activeToolId) {
								window.open(`/tools/${activeToolId}/`, '_blank');
							}
						});
					}

					// 绑定大厅内卡片点击事件
					lobbyView.addEventListener('click', (e) => {
						const card = e.target.closest('.modal-item-card');
						if (!card) return;
						const toolId = card.getAttribute('data-id');
						const title = card.getAttribute('data-name');
						const emoji = card.getAttribute('data-emoji');
						showRunState(toolId, title, emoji);
					});

					// 全局劫持跳转：拦截并就地拉起沙盒运行状态
					const handleLinkIntercept = (e) => {
						const link = e.target.closest('a');
						if (!link) return;
						
						const href = link.getAttribute('href');
						if (!href) return;
						
						// 点击顶栏工具箱触发器 #tools-modal
						if (href === '#tools-modal') {
							e.preventDefault();
							e.stopPropagation();
							openLobby();
							return;
						}
						
						// 匹配 /tools/xxx/ 或 /tools/xxx，排除 tools 首页大厅本身和 tools-sandbox 内部
						const match = href.match(/^\/tools\/([a-zA-Z0-9_-]+)\/?$/);
						if (match) {
							const toolId = match[1];
							if (toolId === 'index' || toolId === '') {
								e.preventDefault();
								e.stopPropagation();
								openLobby();
								return;
							}
							
							e.preventDefault();
							e.stopPropagation();
							
							const text = link.querySelector('h3, h4')?.innerText || toolId;
							modal.classList.add('active');
							showRunState(toolId, text, "🔧");
						}
					};

					document.removeEventListener('click', handleLinkIntercept);
					document.addEventListener('click', handleLinkIntercept);

					// 自动根据 hash 状态初始化弹窗以支持自启和无头测试
					if (window.location.hash === '#tools-modal') {
						openLobby();
					}
					const handleHashChange = () => {
						if (window.location.hash === '#tools-modal') {
							openLobby();
						}
					};
					window.removeEventListener('hashchange', handleHashChange);
					window.addEventListener('hashchange', handleHashChange);
				};

				initGlobalModal();

				// 页面无刷新切换重绑定
				document.addEventListener('swup:page:view', initGlobalModal);
				document.addEventListener('swup:content:replace', initGlobalModal);
				document.addEventListener('astro:page-load', initGlobalModal);
			})();
