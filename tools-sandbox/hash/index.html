<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MD5/SHA256 哈希计算</title>
	<link rel="stylesheet" href="/css/tools.css">
	<style>
		body {
			margin: 0;
			padding: 10px;
			background: transparent;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			color: #333;
			zoom: 1.18; /* 整体缩放 1.18 倍以完美适应大弹窗视野 */
		}
		[data-theme='dark'] body {
			color: #f1f5f9;
		}
	</style>
</head>
<body>
	<!-- Import Crypto-JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<link rel="stylesheet" href="/css/tools.css">

<style>
.result-row {
    margin-bottom: 15px;
}
.result-label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
    color: #49b1f5;
}
.result-value {
    background: #f7f9fe;
    padding: 10px;
    border-radius: 4px;
    border: 1px solid #eee;
    word-break: break-all;
    font-family: monospace;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
[data-theme='dark'] .result-value {
    background: #333;
    border-color: #444;
}
.copy-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 3px;
    cursor: pointer;
    padding: 2px 8px;
    font-size: 12px;
    color: #666;
    margin-left: 10px;
    flex-shrink: 0;
}
.copy-btn:hover {
    background: #eee;
    color: #333;
}
</style>


<div class="tool-container" id="tool-hash-container">
    <div class="tool-section">
        <h2 style="text-align: center; margin-bottom: 20px;">🔐 文本哈希计算</h2>
        
        <label>输入文本 (实时计算):</label>
        <textarea id="input-text" placeholder="在此输入需要计算哈希的内容..." style="width: 100%; height: 120px; margin-bottom: 20px; resize: vertical;"></textarea>

        <div class="result-row">
            <span class="result-label">MD5 (32位)</span>
            <div class="result-value">
                <span id="res-md5">-</span>
                <button class="copy-btn" data-copy-target="res-md5">复制</button>
            </div>
        </div>

        <div class="result-row">
            <span class="result-label">SHA-1 (40位)</span>
            <div class="result-value">
                <span id="res-sha1">-</span>
                <button class="copy-btn" data-copy-target="res-sha1">复制</button>
            </div>
        </div>

        <div class="result-row">
            <span class="result-label">SHA-256 (64位)</span>
            <div class="result-value">
                <span id="res-sha256">-</span>
                <button class="copy-btn" data-copy-target="res-sha256">复制</button>
            </div>
        </div>

        <div class="result-row">
            <span class="result-label">SHA-512 (128位)</span>
            <div class="result-value">
                <span id="res-sha512">-</span>
                <button class="copy-btn" data-copy-target="res-sha512">复制</button>
            </div>
        </div>
    </div>
</div>


<script src="/js/tools/hash.js"></script>
	<script>
		const syncTheme = () => {
			try {
				const isDark = window.parent.document.documentElement.classList.contains('dark') || 
				               window.parent.document.documentElement.getAttribute('data-theme') === 'dark';
				if (isDark) {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			} catch(e) {}
		};
		syncTheme();
		window.addEventListener('message', (e) => {
			if (e.data === 'theme-change') syncTheme();
		});
	</script>
</body>
</html>
