<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>经典 2048</title>
	<link rel="stylesheet" href="/css/tools.css">
	<style>
		body {
			margin: 0;
			padding: 10px;
			background: transparent;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			color: #333;
			zoom: 1.18; /* 整体缩放 1.18 倍以完美适应大弹窗视野 */
		}
		[data-theme='dark'] body {
			color: #f1f5f9;
		}
	</style>
</head>
<body>
	<style>
.game-2048-container {
display: flex;
flex-direction: column;
align-items: center;
margin-top: 20px;
font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
}
.info-bar {
display: flex;
justify-content: space-between;
width: 300px;
margin-bottom: 20px;
}
.score-box {
background: #bbada0;
padding: 10px 20px;
border-radius: 6px;
color: white;
text-align: center;
}
.score-title {
font-size: 13px;
text-transform: uppercase;
font-weight: bold;
color: #eee4da;
}
.score-value {
font-size: 20px;
font-weight: bold;
}
#grid-container {
background: #bbada0;
border-radius: 6px;
width: 310px;
height: 310px;
box-sizing: border-box;
padding: 10px;
display: grid;
grid-template-columns: repeat(4, 1fr);
grid-template-rows: repeat(4, 1fr);
gap: 10px;
position: relative;
touch-action: none;
}
.grid-cell {
background: #cdc1b4;
border-radius: 3px;
}
.tile {
position: absolute;
width: 65px;
height: 65px;
background: #eee4da;
border-radius: 3px;
display: flex;
justify-content: center;
align-items: center;
font-weight: bold;
font-size: 30px;
color: #776e65;
transition: 100ms ease-in-out;
transition-property: top, left, background-color, transform;
}
/* Colors for tiles */
.tile-2 { background: #eee4da; }
.tile-4 { background: #ede0c8; }
.tile-8 { background: #f2b179; color: #f9f6f2; }
.tile-16 { background: #f59563; color: #f9f6f2; }
.tile-32 { background: #f67c5f; color: #f9f6f2; }
.tile-64 { background: #f65e3b; color: #f9f6f2; }
.tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
.tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
.tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }
.game-btn {
padding: 10px 20px;
background-color: #8f7a66;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-size: 1rem;
font-weight: bold;
margin-top: 20px;
}
.game-btn:hover { background-color: #9f8b77; }
.game-message {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(238, 228, 218, 0.73);
z-index: 100;
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
border-radius: 6px;
}
.game-message p {
font-size: 30px;
font-weight: bold;
color: #776e65;
margin-bottom: 20px;
}
</style>

<div class="game-2048-container">
<div class="info-bar">
<div class="score-box">
<div class="score-title">当前分数</div>
<div class="score-value" id="score">0</div>
</div>
<div class="score-box">
<div class="score-title">最高分数</div>
<div class="score-value" id="best-score">0</div>
</div>
</div>

<div id="grid-container">
<div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
<div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
<div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
<div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
<div id="tile-container"></div>

<div class="game-message" id="game-message">
<p id="message-text">游戏结束!</p>
<button class="game-btn" id="retry-btn">再试一次</button>
</div>
</div>

<div style="display:flex; gap:10px; margin-top:20px;">
<button class="game-btn" id="new-game-btn" style="margin-top:0;">开始新游戏</button>
<button class="game-btn" id="ai-play-btn" style="margin-top:0;">🤖 AI 托管</button>
</div>
<label style="font-size:12px; margin-top: 15px; color:#ff9800;" id="gpu-label">
<input type="checkbox" id="g-gpu-toggle" disabled> 🔍 探测 WebGPU 算力引擎中...
</label>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
const gridContainer = document.getElementById('grid-container');
const tileContainer = document.getElementById('tile-container');
const scoreDisplay = document.getElementById('score');
const bestScoreDisplay = document.getElementById('best-score');
const messageBox = document.getElementById('game-message');
const messageText = document.getElementById('message-text');

let grid = [];
let score = 0;
let bestScore = localStorage.getItem('2048-best') || 0;
bestScoreDisplay.innerText = bestScore;
let hasWon = false;
let isGameOver = false;

const size = 4;
const padding = 10;
const cellSize = 65;

function initGame() {
grid = Array.from({length: size}, () => Array(size).fill(0));
score = 0;
hasWon = false;
isGameOver = false;
scoreDisplay.innerText = '0';
messageBox.style.display = 'none';
tileContainer.innerHTML = '';
addRandomTile();
addRandomTile();
renderTiles();
}

function addRandomTile() {
let emptyCells = [];
for (let r=0; r<size; r++) {
for (let c=0; c<size; c++) {
if (grid[r][c] === 0) emptyCells.push({r, c});
}
}
if (emptyCells.length > 0) {
const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}
}

function renderTiles() {
tileContainer.innerHTML = '';
for (let r=0; r<size; r++) {
for (let c=0; c<size; c++) {
if (grid[r][c] !== 0) {
const val = grid[r][c];
let tile = document.createElement('div');
tile.className = `tile tile-${val}`;
tile.innerText = val;
// Calculate position
tile.style.top = `${padding + r * (cellSize + padding)}px`;
tile.style.left = `${padding + c * (cellSize + padding)}px`;
tileContainer.appendChild(tile);
}
}
}
}

function move(direction) {
if (isGameOver) return;
let moved = false;
let newGrid = Array.from({length: size}, () => Array(size).fill(0));

// Rotate grid to make logic simple (always slide left)
// 0: left, 1: up, 2: right, 3: down
let workingGrid = cloneGrid(grid);
for(let i=0; i<direction; i++) workingGrid = rotateGrid(workingGrid);

for (let r=0; r<size; r++) {
let row = workingGrid[r].filter(val => val !== 0);
for (let c=0; c<row.length-1; c++) {
if (row[c] === row[c+1]) {
row[c] *= 2;
score += row[c];
if (row[c] === 2048 && !hasWon) {
hasWon = true; 
messageText.innerText = '你赢啦！';
messageBox.style.display = 'flex';
}
row.splice(c+1, 1);
}
}
while(row.length < size) row.push(0);
if (workingGrid[r].join(',') !== row.join(',')) moved = true;
workingGrid[r] = row;
}

// Rotate back
for(let i=0; i<(4-direction)%4; i++) workingGrid = rotateGrid(workingGrid);

if (moved) {
grid = workingGrid;
scoreDisplay.innerText = score;
if (score > bestScore) {
bestScore = score;
bestScoreDisplay.innerText = bestScore;
localStorage.setItem('2048-best', bestScore);
}
addRandomTile();
renderTiles();
if (checkGameOver()) {
isGameOver = true;
messageText.innerText = '游戏结束！';
messageBox.style.display = 'flex';
}
}
}

function cloneGrid(g) { return g.map(r => [...r]); }
function rotateGrid(g) {
let newG = Array.from({length: size}, () => Array(size).fill(0));
for (let r=0; r<size; r++) {
for (let c=0; c<size; c++) {
newG[c][size-1-r] = g[r][c];
}
}
return newG;
}

function checkGameOver() {
for (let r=0; r<size; r++) {
for (let c=0; c<size; c++) {
if (grid[r][c] === 0) return false;
if (c < size-1 && grid[r][c] === grid[r][c+1]) return false;
if (r < size-1 && grid[r][c] === grid[r+1][c]) return false;
}
}
return true;
}

document.addEventListener('keydown', (e) => {
if([37,38,39,40].includes(e.keyCode)) e.preventDefault();
if (e.key === 'ArrowLeft') move(0);
else if (e.key === 'ArrowUp') move(1);
else if (e.key === 'ArrowRight') move(2);
else if (e.key === 'ArrowDown') move(3);
});

// Touch handlers
let touchStartX, touchStartY;
gridContainer.addEventListener('touchstart', e => {
touchStartX = e.touches[0].clientX;
touchStartY = e.touches[0].clientY;
});
gridContainer.addEventListener('touchend', e => {
if(!touchStartX || !touchStartY) return;
let dx = e.changedTouches[0].clientX - touchStartX;
let dy = e.changedTouches[0].clientY - touchStartY;
if (Math.abs(dx) > Math.abs(dy)) {
if (dx > 30) move(2); // right
else if (dx < -30) move(0); // left
} else {
if (dy > 30) move(3); // down
else if (dy < -30) move(1); // up
}
touchStartX = null; touchStartY = null;
});

// AI Logic
let aiMode = false;
let aiTimer = null;
const aiBtn = document.getElementById('ai-play-btn');

function evaluateBoard(g) {
let emptyScore = 0;
let smoothScore = 0;
let monoScore = 0;
let maxTile = 0;

for(let r=0; r<size; r++) {
for(let c=0; c<size; c++) {
if(g[r][c] === 0) emptyScore += 270;
else {
if(g[r][c] > maxTile) maxTile = g[r][c];
// 惩罚相邻大小差异 (平滑度)
if(c<size-1 && g[r][c+1]!==0) smoothScore -= Math.abs(g[r][c] - g[r][c+1]) * 0.1;
if(r<size-1 && g[r+1][c]!==0) smoothScore -= Math.abs(g[r][c] - g[r+1][c]) * 0.1;

// 奖励单调性 (左上角最大)
if(c<size-1 && g[r][c] >= g[r][c+1]) monoScore += 40;
else if(c<size-1 && g[r][c] < g[r][c+1]) monoScore -= 50;

if(r<size-1 && g[r][c] >= g[r+1][c]) monoScore += 40;
else if(r<size-1 && g[r][c] < g[r+1][c]) monoScore -= 50;
}
}
}
// 强制大块锁死在角落 (0,0) 或边缘
let cornerScore = 0;
if(g[0][0] === maxTile) cornerScore += 10000;
else if(g[0][3] === maxTile || g[3][0] === maxTile || g[3][3] === maxTile) cornerScore += 2000;
else cornerScore -= 5000;

return emptyScore + smoothScore + monoScore + cornerScore;
}

function simulateMove(dir) {
let moved = false;
let workingGrid = cloneGrid(grid);
for(let i=0; i<dir; i++) workingGrid = rotateGrid(workingGrid);
for (let r=0; r<size; r++) {
let row = workingGrid[r].filter(val => val !== 0);
for (let c=0; c<row.length-1; c++) {
if (row[c] === row[c+1]) { row[c] *= 2; row.splice(c+1, 1); }
}
while(row.length < size) row.push(0);
if (workingGrid[r].join(',') !== row.join(',')) moved = true;
workingGrid[r] = row;
}
for(let i=0; i<(4-dir)%4; i++) workingGrid = rotateGrid(workingGrid);
return {moved, newGrid: workingGrid};
}

// ====== WEBGPU 2048 IMPLEMENTATION ======
let device = null;
let computePipeline = null;
let gpuEnabled = false;
let gpuBufferScore, gpuBufferGrids;

const wgslCode = `
@group(0) @binding(0) var<storage, read> grids: array<i32>;
@group(0) @binding(1) var<storage, read_write> scores: array<f32>;

fn evaluate(grid: array<i32, 16>) -> f32 {
    var emptyScore: i32 = 0;
    var smoothScore: f32 = 0.0;
    var monoScore: i32 = 0;
    var maxTile: i32 = 0;
    
    for(var r=0; r<4; r=r+1) {
        for(var c=0; c<4; c=c+1) {
            let val = grid[r * 4 + c];
            if(val == 0) { emptyScore = emptyScore + 270; }
            else {
                if(val > maxTile) { maxTile = val; }
                if(c < 3) {
                    let rVal = grid[r * 4 + c + 1];
                    if (rVal != 0) { smoothScore = smoothScore - f32(abs(val - rVal)) * 0.1; }
                    if (val >= rVal) { monoScore = monoScore + 40; } else { monoScore = monoScore - 50; }
                }
                if(r < 3) {
                    let bVal = grid[(r + 1) * 4 + c];
                    if (bVal != 0) { smoothScore = smoothScore - f32(abs(val - bVal)) * 0.1; }
                    if (val >= bVal) { monoScore = monoScore + 40; } else { monoScore = monoScore - 50; }
                }
            }
        }
    }
    
    var cornerScore: f32 = 0.0;
    if(grid[0] == maxTile) { cornerScore = cornerScore + 10000.0; }
    else if(grid[3] == maxTile || grid[12] == maxTile || grid[15] == maxTile) { cornerScore = cornerScore + 2000.0; }
    else { cornerScore = cornerScore - 5000.0; }
    
    return f32(emptyScore + monoScore) + smoothScore + cornerScore;
}

fn rotateGrid(g: array<i32, 16>, dir: u32) -> array<i32, 16> {
    var working: array<i32, 16> = g;
    for(var i=0u; i<dir; i=i+1u) {
        var temp: array<i32, 16>;
        for(var r=0u; r<4u; r=r+1u) {
            for(var c=0u; c<4u; c=c+1u) {
                temp[c * 4u + (3u - r)] = working[r * 4u + c];
            }
        }
        working = temp;
    }
    return working;
}

fn rotateGridBack(g: array<i32, 16>, dir: u32) -> array<i32, 16> {
    return rotateGrid(g, (4u - dir) % 4u);
}

fn slideGrid(g: array<i32, 16>) -> array<i32, 16> {
    var res: array<i32, 16>;
    for(var i=0; i<16; i=i+1) { res[i] = 0; }
    for(var r=0u; r<4u; r=r+1u) {
        var col: u32 = 0u;
        var lastVal: i32 = 0;
        for(var c=0u; c<4u; c=c+1u) {
            let val = g[r * 4u + c];
            if(val != 0) {
                if(lastVal == val) {
                    res[r * 4u + col - 1u] = val * 2;
                    lastVal = 0;
                } else {
                    res[r * 4u + col] = val;
                    lastVal = val;
                    col = col + 1u;
                }
            }
        }
    }
    return res;
}

@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
    let index = id.x; 
    if (index >= 256u) { return; }
    
    let dir1 = index / 64u;
    let emptyIdx = (index / 4u) % 16u;
    let dir2 = index % 4u;
    
    var baseGrid: array<i32, 16>;
    for(var i=0u; i<16u; i=i+1u) {
        baseGrid[i] = grids[dir1 * 16u + i];
    }
    
    if (baseGrid[0] == -999 || baseGrid[emptyIdx] != 0) {
        scores[index] = -999999.0;
        return;
    }
    
    baseGrid[emptyIdx] = 2; // Spawn 2
    var working = rotateGrid(baseGrid, dir2);
    working = slideGrid(working);
    working = rotateGridBack(working, dir2);
    
    scores[index] = evaluate(working);
}
`;

async function initWebGPU() {
    const gpuLabel = document.getElementById('gpu-label');
    if (!navigator.gpu) {
        gpuLabel.innerHTML = '❌ WebGPU 未能命中 (已回退至 JS 串行动力核)';
        return;
    }
    try {
        const adapter = await navigator.gpu.requestAdapter();
        device = await adapter.requestDevice();
        const shaderModule = device.createShaderModule({ code: wgslCode });
        computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: shaderModule, entryPoint: 'main' },
        });

        gpuBufferScore = device.createBuffer({ size: 256*4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });
        gpuBufferGrids = device.createBuffer({ size: 4*16*4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        gpuEnabled = true;
        gpuLabel.style.color = "#4caf50";
        gpuLabel.innerHTML = '<input type="checkbox" id="g-gpu-toggle" checked> 🚀 已激活 WebGPU 高并发计算加速引擎 (启动 256 MCTS 寻路流处理器)';
        document.getElementById('g-gpu-toggle').addEventListener('change', (e) => gpuEnabled = e.target.checked);
    } catch(e) {
        gpuLabel.innerHTML = '❌ 初始化 WebGPU 失败';
    }
}

async function aiStepGPU() {
    let gridsData = new Int32Array(4 * 16);
    let validMoves = [false, false, false, false];
    
    for(let d=0; d<4; d++) {
        let res = simulateMove(d);
        validMoves[d] = res.moved;
        if (!res.moved) {
            gridsData[d*16] = -999;
        } else {
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    gridsData[d*16 + r*4 + c] = res.newGrid[r][c];
                }
            }
        }
    }
    
    device.queue.writeBuffer(gpuBufferGrids, 0, gridsData);
    
    const bindGroup = device.createBindGroup({
        layout: computePipeline.getBindGroupLayout(0),
        entries: [
            { binding: 0, resource: { buffer: gpuBufferGrids } },
            { binding: 1, resource: { buffer: gpuBufferScore } },
        ]
    });

    const commandEncoder = device.createCommandEncoder();
    const passEncoder = commandEncoder.beginComputePass();
    passEncoder.setPipeline(computePipeline);
    passEncoder.setBindGroup(0, bindGroup);
    passEncoder.dispatchWorkgroups(4); // 256 Threads
    passEncoder.end();

    const outputBuffer = device.createBuffer({ size: 256*4, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });
    commandEncoder.copyBufferToBuffer(gpuBufferScore, 0, outputBuffer, 0, 256*4);
    device.queue.submit([commandEncoder.finish()]);

    await outputBuffer.mapAsync(GPUMapMode.READ);
    const scores = new Float32Array(outputBuffer.getMappedRange());
    
    let bestScore = -Infinity;
    let bestDir = -1;
    for(let dir1=0; dir1<4; dir1++) {
        if(!validMoves[dir1]) continue;
        
        let expectedScore = 0;
        let emptyCount = 0;
        for(let e=0; e<16; e++) {
            if(gridsData[dir1*16 + e] === 0) {
                let maxDir2 = -Infinity;
                for(let dir2=0; dir2<4; dir2++) {
                    let s = scores[dir1*64 + e*4 + dir2];
                    if(s > maxDir2) maxDir2 = s;
                }
                expectedScore += maxDir2;
                emptyCount++;
            }
        }
        if(emptyCount > 0) expectedScore /= emptyCount;
        else expectedScore = evaluateBoard(simulateMove(dir1).newGrid); 
        
        // Add a base score of 1st move to guide it
        expectedScore += evaluateBoard(simulateMove(dir1).newGrid) * 0.5;

        if(expectedScore > bestScore) {
            bestScore = expectedScore;
            bestDir = dir1;
        }
    }
    outputBuffer.unmap();
    
    if(bestDir !== -1) move(bestDir);
    else {
        let dirs = [0,1,2,3].filter(d => validMoves[d]);
        if(dirs.length > 0) move(dirs[0]);
    }
}

async function aiStep() {
if (isGameOver || hasWon) {
toggleAI(false);
return;
}

if (gpuEnabled) {
await aiStepGPU();
return;
}

let bestScore = -Infinity;
let bestDir = -1;
for(let d=0; d<4; d++) {
let res = simulateMove(d);
if(res.moved) {
let s = evaluateBoard(res.newGrid);
if(s > bestScore) { bestScore = s; bestDir = d; }
}
}
if(bestDir !== -1) move(bestDir);
else {
// Random valid move
let dirs = [0,1,2,3].filter(d => simulateMove(d).moved);
if(dirs.length > 0) move(dirs[0]);
}
}

function toggleAI(state) {
aiMode = state ?? !aiMode;
aiBtn.innerText = aiMode ? "停止托管" : "🤖 AI 托管";
if (aiMode) {
aiTimer = setInterval(aiStep, 150);
} else {
clearInterval(aiTimer);
}
}

aiBtn.addEventListener('click', () => toggleAI());
document.getElementById('new-game-btn').addEventListener('click', initGame);
document.getElementById('retry-btn').addEventListener('click', initGame);

initWebGPU();
initGame();
});
</script>
	<script>
		const syncTheme = () => {
			try {
				const isDark = window.parent.document.documentElement.classList.contains('dark') || 
				               window.parent.document.documentElement.getAttribute('data-theme') === 'dark';
				if (isDark) {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			} catch(e) {}
		};
		syncTheme();
		window.addEventListener('message', (e) => {
			if (e.data === 'theme-change') syncTheme();
		});
	</script>
