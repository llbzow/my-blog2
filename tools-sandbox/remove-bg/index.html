<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>快速抠图工具</title>
	<link rel="stylesheet" href="/css/tools.css">
	<style>
		body {
			margin: 0;
			padding: 10px;
			background: transparent;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			color: #333;
			zoom: 1.18; /* 整体缩放 1.18 倍以完美适应大弹窗视野 */
		}
		[data-theme='dark'] body {
			color: #f1f5f9;
		}
	</style>
</head>
<body>
	<link rel="stylesheet" href="/css/tools.css">

<style>
.canvas-wrapper {
    margin-top: 20px;
    overflow: auto;
    border: 1px solid #ddd;
    /* Checkerboard bg for transparency */
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><rect width="10" height="10" fill="%23eee"/><rect x="10" y="10" width="10" height="10" fill="%23eee"/></svg>') repeat;
}
.controls {
    display: flex;
    gap: 20px;
    margin: 20px 0;
    align-items: center;
    flex-wrap: wrap;
}
.color-picker-box {
    width: 30px;
    height: 30px;
    border: 1px solid #ccc;
    border-radius: 4px;
    display: inline-block;
    vertical-align: middle;
}
</style>


<div class="tool-container" id="tool-removebg-container">
    <div class="tool-section">
        <h2 style="text-align: center; margin-bottom: 20px;">✂️ 快速颜色抠图</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            点击图片中的颜色即可将其扣除（变透明）。适用于纯色背景图片。
        </p>

        <div class="upload-box" id="upload-box">
            <p>点击上传图片</p>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>

        <div class="controls">
            <div>
                <label>目标颜色:</label>
                <div id="target-color" class="color-picker-box" style="background: #ffffff;"></div>
                <span id="target-color-text">#ffffff</span>
            </div>
            <div>
                <label>容差 (0-100):</label>
                <input type="range" id="tolerance" min="0" max="100" value="20">
                <span id="tol-val">20</span>
            </div>
            <button id="btn-reset" style="padding: 5px 15px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer;">重置</button>
            <button id="btn-download" style="padding: 5px 15px; background: #49b1f5; color: white; border: none; border-radius: 4px; cursor: pointer;">下载结果</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>
</div>


<script src="/js/tools/remove-bg.js"></script>
	<script>
		const syncTheme = () => {
			try {
				const isDark = window.parent.document.documentElement.classList.contains('dark') || 
				               window.parent.document.documentElement.getAttribute('data-theme') === 'dark';
				if (isDark) {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			} catch(e) {}
		};
		syncTheme();
		window.addEventListener('message', (e) => {
			if (e.data === 'theme-change') syncTheme();
		});
	</script>
</body>
</html>
