<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>幻影坦克制作</title>
	<link rel="stylesheet" href="/css/tools.css">
	<style>
		body {
			margin: 0;
			padding: 10px;
			background: transparent;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			color: #333;
			zoom: 1.18; /* 整体缩放 1.18 倍以完美适应大弹窗视野 */
		}
		[data-theme='dark'] body {
			color: #f1f5f9;
		}
	</style>
</head>
<body>
	<link rel="stylesheet" href="/css/tools.css">

<style>
.upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}
.upload-box img {
    max-width: 100%;
    max-height: 180px;
    object-fit: contain;
}
.result-area {
    margin-top: 30px;
    text-align: center;
    display: none;
}
#result-canvas {
    max-width: 100%;
    border: 1px solid #ccc;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><rect width="10" height="10" fill="%23ccc"/><rect x="10" y="10" width="10" height="10" fill="%23ccc"/></svg>') repeat;
}
.preview-bg-btn {
    margin: 10px 5px;
    padding: 5px 15px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
}
</style>


<div class="tool-container" id="tool-mirage-container">
    <div class="tool-section">
        <h2 style="text-align: center; margin-bottom: 30px;">👻 幻影坦克制作工具</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            生成的图片在白色背景下显示“表图”，在黑色背景下显示“里图”。<br>
            建议：表图较亮，里图较暗效果最佳。
        </p>
        
        <div class="upload-grid">
            <div class="upload-box" onclick="document.getElementById('img-surface').click()">
                <div id="preview-surface-text">
                    <h3>选择表图 (显示于白底)</h3>
                    <p>点击上传</p>
                </div>
                <img id="preview-surface-img" style="display: none;">
                <input type="file" id="img-surface" accept="image/*" style="display: none;">
            </div>
            
            <div class="upload-box" onclick="document.getElementById('img-hidden').click()">
                <div id="preview-hidden-text">
                    <h3>选择里图 (显示于黑底)</h3>
                    <p>点击上传</p>
                </div>
                <img id="preview-hidden-img" style="display: none;">
                <input type="file" id="img-hidden" accept="image/*" style="display: none;">
            </div>
        </div>

        <button class="btn" id="generate-btn" disabled style="width: 100%;">生成幻影坦克</button>

        <div class="result-area" id="result-area">
            <h3>生成结果</h3>
            <p>点击下方按钮切换背景预览效果：</p>
            <div>
                <button class="preview-bg-btn" data-bg="white">⚪ 白色背景</button>
                <button class="preview-bg-btn" data-bg="black" style="background:black; color:white;">⚫ 黑色背景</button>
                <button class="preview-bg-btn" data-bg="checker">🏁 透明背景</button>
            </div>
            <br>
            <canvas id="result-canvas"></canvas>
            <br><br>
            <button class="btn" id="btn-download">下载图片</button>
        </div>
    </div>
</div>


<script src="/js/tools/mirage-tank.js"></script>
	<script>
		const syncTheme = () => {
			try {
				const isDark = window.parent.document.documentElement.classList.contains('dark') || 
				               window.parent.document.documentElement.getAttribute('data-theme') === 'dark';
				if (isDark) {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			} catch(e) {}
		};
		syncTheme();
		window.addEventListener('message', (e) => {
			if (e.data === 'theme-change') syncTheme();
		});
	</script>
</body>
</html>
